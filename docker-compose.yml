services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-tree-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - family-tree-network
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:alpine
    container_name: family-tree-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - family-tree-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: family-tree-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: family_tree
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: family_tree_user
      MYSQL_PASSWORD: family_tree_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - family-tree-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  family-tree-network:
    driver: bridge
